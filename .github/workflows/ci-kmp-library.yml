# Reusable CI workflow for Kotlin Multiplatform libraries
#
# Fast gate (default — every push/PR, ~3-5 min):
#   detect changes → quality (Spotless + Detekt) → JVM tests → compile-all-targets (assemble)
#
# Slow gate (opt-in — pre-release / nightly):
#   + run-ios-tests: true   → iosSimulatorArm64Test on macos-14
#   + run-linux-tests: true → linuxX64Test on ubuntu-latest
#
# Rationale: compile-all-targets catches missing actuals / type errors on every platform.
# JVM tests validate 95% of common logic. iOS/Linux test execution is opt-in for release gates.
#
# Usage from your repo:
#   jobs:
#     ci:
#       uses: MobileByteLabs/mbl-actionhub/.github/workflows/ci-kmp-library.yml@v1.1.1
#       with:
#         module-pattern: 'cmp-'        # optional, default: cmp-
#         java-version: '21'            # optional, default: 21
#         run-ios-tests: true           # opt-in for slow gate
#         run-linux-tests: true         # opt-in for slow gate

name: CI — KMP Library

on:
  workflow_call:
    inputs:
      module-pattern:
        description: 'Prefix pattern for library modules (default: cmp-)'
        type: string
        default: 'cmp-'
      module-path:
        description: 'Exact relative path to a nested module (e.g. build-logic/flavor-plugin). When set, bypasses module-pattern glob discovery.'
        type: string
        default: ''
      java-version:
        description: 'JDK version'
        type: string
        default: '21'
      java-distribution:
        description: 'JDK distribution'
        type: string
        default: 'zulu'
      run-ios-tests:
        description: 'Run iOS Simulator tests — slow gate, opt-in only (requires macOS runner)'
        type: boolean
        default: false
      run-linux-tests:
        description: 'Run Linux Native tests — slow gate, opt-in only'
        type: boolean
        default: false
      run-quality:
        description: 'Run Spotless + Detekt quality checks'
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  # ─── Detect changed modules ────────────────────────────────────────────────
  detect-changes:
    name: Detect Changed Modules
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.detect.outputs.modules }}
      build_all: ${{ steps.detect.outputs.build_all }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed modules
        id: detect
        run: |
          MODULE_PATH="${{ inputs.module-path }}"

          # Direct path mode — always build the single known module, no glob needed.
          if [ -n "$MODULE_PATH" ]; then
            echo "build_all=false" >> $GITHUB_OUTPUT
            echo "modules=$MODULE_PATH" >> $GITHUB_OUTPUT
            echo "▶ Direct module path: $MODULE_PATH"
            exit 0
          fi

          PATTERN="${{ inputs.module-pattern }}"

          # workflow_call (publish gate) always builds everything
          if [ "${{ github.event_name }}" = "workflow_call" ]; then
            echo "build_all=true" >> $GITHUB_OUTPUT
            echo "modules=" >> $GITHUB_OUTPUT
            echo "▶ Publish gate — building all modules"
            exit 0
          fi

          # Push to main/development/master always builds everything.
          # Every merge to the main branch must be fully verified — no skipping.
          if [ "${{ github.event_name }}" = "push" ]; then
            BRANCH="${GITHUB_REF#refs/heads/}"
            if echo "$BRANCH" | grep -qE "^(main|master|development)$"; then
              echo "build_all=true" >> $GITHUB_OUTPUT
              echo "modules=" >> $GITHUB_OUTPUT
              echo "▶ Push to $BRANCH — building all modules"
              exit 0
            fi
          fi

          # For push events to feature branches, diff against parent commit.
          if [ "${{ github.event_name }}" = "push" ]; then
            BASE_SHA=$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)
          else
            # PRs: diff against the target branch tip for accurate changed-file detection
            BASE_SHA=$(git merge-base HEAD "origin/${{ github.base_ref || 'development' }}" 2>/dev/null || git rev-parse HEAD~1)
          fi
          CHANGED=$(git diff --name-only "$BASE_SHA" HEAD)

          echo "Changed files:"
          echo "$CHANGED"

          # Root config change → rebuild all
          if echo "$CHANGED" | grep -qE "^(build\.gradle\.kts|settings\.gradle\.kts|gradle/|buildSrc/|gradle\.properties|\.github/)"; then
            echo "build_all=true" >> $GITHUB_OUTPUT
            echo "modules=" >> $GITHUB_OUTPUT
            echo "▶ Root config changed — building all modules"
            exit 0
          fi

          MODULES=$(echo "$CHANGED" \
            | grep "^${PATTERN}" \
            | cut -d/ -f1 \
            | grep -v "^${PATTERN}library$" \
            | sort -u \
            | tr '\n' ' ' \
            | sed 's/ $//')

          if [ -z "$MODULES" ]; then
            echo "build_all=false" >> $GITHUB_OUTPUT
            echo "modules=NONE" >> $GITHUB_OUTPUT
            echo "▶ No ${PATTERN}* modules changed — skipping"
          else
            echo "build_all=false" >> $GITHUB_OUTPUT
            echo "modules=$MODULES" >> $GITHUB_OUTPUT
            echo "▶ Changed modules: $MODULES"
          fi

  # ─── Code quality ──────────────────────────────────────────────────────────
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: detect-changes
    if: ${{ inputs.run-quality }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: ${{ inputs.java-distribution }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Spotless Check
        run: ./gradlew spotlessCheck

      - name: Run Detekt
        run: ./gradlew detekt

      - name: Upload Detekt Report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: detekt-report
          path: build/reports/detekt/

  # ─── JVM tests (fast gate — always runs) ───────────────────────────────────
  test-jvm:
    name: Test (JVM)
    needs: [detect-changes, quality]
    if: |
      always() &&
      needs.quality.result != 'failure' &&
      needs.detect-changes.outputs.modules != 'NONE'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: ${{ inputs.java-distribution }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run JVM Tests
        run: |
          MODULE_PATH="${{ inputs.module-path }}"
          PATTERN="${{ inputs.module-pattern }}"
          BUILD_ALL="${{ needs.detect-changes.outputs.build_all }}"
          MODULES="${{ needs.detect-changes.outputs.modules }}"
          TASKS=""

          if [ -n "$MODULE_PATH" ]; then
            if [ -d "${MODULE_PATH}/src/jvmMain" ]; then
              GRADLE_PATH=$(echo "$MODULE_PATH" | tr '/' ':')
              TASKS=":${GRADLE_PATH}:jvmTest"
            fi
          elif [ "$BUILD_ALL" = "true" ] || [ -z "$MODULES" ]; then
            for dir in ${PATTERN}*/; do
              [ "$dir" = "${PATTERN}library/" ] && continue
              [ -d "${dir}src/jvmMain" ] || continue
              TASKS="$TASKS :${dir%/}:jvmTest"
            done
          else
            for MODULE in $MODULES; do
              [ -d "${MODULE}/src/jvmMain" ] && TASKS="$TASKS :${MODULE}:jvmTest"
            done
          fi

          if [ -z "$TASKS" ]; then
            echo "No modules with jvmMain — skipping"
            exit 0
          fi

          echo "Running: ./gradlew $TASKS --parallel"
          ./gradlew $TASKS --parallel

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-reports-jvm
          path: |
            **/build/reports/tests/
            **/build/test-results/

  # ─── iOS Simulator tests (slow gate — opt-in) ──────────────────────────────
  test-ios:
    name: Test (iOS Simulator)
    needs: [detect-changes, quality]
    if: |
      inputs.run-ios-tests == true &&
      always() &&
      needs.quality.result != 'failure' &&
      needs.detect-changes.outputs.modules != 'NONE'
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Kotlin/Native
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: ${{ runner.os }}-konan-

      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: ${{ inputs.java-distribution }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run iOS Simulator Tests
        run: |
          MODULE_PATH="${{ inputs.module-path }}"
          PATTERN="${{ inputs.module-pattern }}"
          BUILD_ALL="${{ needs.detect-changes.outputs.build_all }}"
          MODULES="${{ needs.detect-changes.outputs.modules }}"
          TASKS=""

          if [ -n "$MODULE_PATH" ]; then
            GRADLE_PATH=$(echo "$MODULE_PATH" | tr '/' ':')
            TASKS=":${GRADLE_PATH}:iosSimulatorArm64Test"
          elif [ "$BUILD_ALL" = "true" ] || [ -z "$MODULES" ]; then
            for dir in ${PATTERN}*/; do
              [ "$dir" = "${PATTERN}library/" ] && continue
              [ -d "$dir" ] && TASKS="$TASKS :${dir%/}:iosSimulatorArm64Test"
            done
          else
            for MODULE in $MODULES; do
              [ -d "${MODULE}/" ] && TASKS="$TASKS :${MODULE}:iosSimulatorArm64Test"
            done
          fi

          if [ -z "$TASKS" ]; then
            echo "No modules — skipping"
            exit 0
          fi

          echo "Running: ./gradlew $TASKS --parallel"
          ./gradlew $TASKS --parallel

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-reports-ios
          path: |
            **/build/reports/tests/
            **/build/test-results/

  # ─── Linux Native tests (slow gate — opt-in) ───────────────────────────────
  test-linux:
    name: Test (Linux Native)
    needs: [detect-changes, quality]
    if: |
      inputs.run-linux-tests == true &&
      always() &&
      needs.quality.result != 'failure' &&
      needs.detect-changes.outputs.modules != 'NONE'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Kotlin/Native
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: ${{ runner.os }}-konan-

      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: ${{ inputs.java-distribution }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Linux Native Tests
        run: |
          MODULE_PATH="${{ inputs.module-path }}"
          PATTERN="${{ inputs.module-pattern }}"
          BUILD_ALL="${{ needs.detect-changes.outputs.build_all }}"
          MODULES="${{ needs.detect-changes.outputs.modules }}"
          TASKS=""

          if [ -n "$MODULE_PATH" ]; then
            if [ -d "${MODULE_PATH}/src/linuxMain" ]; then
              GRADLE_PATH=$(echo "$MODULE_PATH" | tr '/' ':')
              TASKS=":${GRADLE_PATH}:linuxX64Test"
            fi
          elif [ "$BUILD_ALL" = "true" ] || [ -z "$MODULES" ]; then
            for dir in ${PATTERN}*/; do
              [ "$dir" = "${PATTERN}library/" ] && continue
              [ -d "${dir}src/linuxMain" ] || continue
              TASKS="$TASKS :${dir%/}:linuxX64Test"
            done
          else
            for MODULE in $MODULES; do
              [ -d "${MODULE}/src/linuxMain" ] && TASKS="$TASKS :${MODULE}:linuxX64Test"
            done
          fi

          if [ -z "$TASKS" ]; then
            echo "No modules with linuxMain — skipping"
            exit 0
          fi

          echo "Running: ./gradlew $TASKS --parallel"
          ./gradlew $TASKS --parallel

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-reports-linux
          path: |
            **/build/reports/tests/
            **/build/test-results/

  # ─── Compile all targets (fast gate — always runs) ─────────────────────────
  # Catches missing actuals / type errors across every KMP platform without
  # running tests (much faster than test execution on native targets).
  compile-all-targets:
    name: Compile All Targets
    needs: [detect-changes, test-jvm]
    if: |
      always() &&
      needs.detect-changes.outputs.modules != 'NONE' &&
      needs.test-jvm.result != 'failure'
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Kotlin/Native
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: ${{ runner.os }}-konan-

      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: ${{ inputs.java-distribution }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble All Libraries (All Targets)
        run: |
          MODULE_PATH="${{ inputs.module-path }}"
          TASKS=""
          if [ -n "$MODULE_PATH" ]; then
            GRADLE_PATH=$(echo "$MODULE_PATH" | tr '/' ':')
            TASKS=":${GRADLE_PATH}:assemble"
          else
            PATTERN="${{ inputs.module-pattern }}"
            for dir in ${PATTERN}*/; do
              [ "$dir" = "${PATTERN}library/" ] && continue
              [ -d "$dir" ] && TASKS="$TASKS :${dir%/}:assemble"
            done
          fi
          echo "Running: ./gradlew $TASKS --parallel"
          ./gradlew $TASKS --parallel

      - name: Build Summary
        run: |
          MODULE_PATH="${{ inputs.module-path }}"
          echo "## Library Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Module | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          if [ -n "$MODULE_PATH" ]; then
            echo "| $MODULE_PATH | ✅ All targets compiled |" >> $GITHUB_STEP_SUMMARY
          else
            PATTERN="${{ inputs.module-pattern }}"
            for dir in ${PATTERN}*/; do
              if [ -d "$dir" ] && [ "$dir" != "${PATTERN}library/" ]; then
                echo "| ${dir%/} | ✅ All targets compiled |" >> $GITHUB_STEP_SUMMARY
              fi
            done
          fi
