# Reusable publish workflow for Kotlin Multiplatform libraries
#
# Discovers all publishable modules → auto-resolves version → runs CI gate →
# publishes in parallel to Maven Central
#
# Version resolution (configurable via inputs, see below):
#   1. inputs.version (explicit, no bump)
#   2. gradle.properties (when gradle-properties-key is set)
#   3. GitHub Releases (highest matching semver tag, patch-bumped)
#   4. Maven Central (patch-bumped)
#   5. Sanity check: resolved must be > latest on Maven Central
#
# See MobileByteLabs/mbl-actionhub-resolve-version@v1.2.0 for full reference.
#
# Usage from your repo:
#   jobs:
#     publish:
#       uses: MobileByteLabs/mbl-actionhub/.github/workflows/publish-kmp-library.yml@v1.0.13
#       with:
#         module-pattern: 'cmp-'
#         group-id: 'io.github.mobilebytelabs'
#         artifact-id: 'cmp-clipboard'
#         gradle-properties-key: 'kmptoolkit.version'   # recommended
#       secrets: inherit

name: Publish — KMP Library

on:
  workflow_call:
    inputs:
      module-pattern:
        description: 'Prefix pattern for library modules (default: cmp-)'
        type: string
        default: 'cmp-'
      module:
        description: 'Specific module to publish (leave empty for all matching modules)'
        type: string
        default: ''
      module-path:
        description: 'Exact relative path to a nested module (e.g. build-logic/flavor-plugin). When set, bypasses module-pattern glob discovery.'
        type: string
        default: ''
      group-id:
        description: 'Maven group ID (e.g. io.github.mobilebytelabs)'
        type: string
        default: ''
      artifact-id:
        description: 'Maven artifact ID for version lookup (e.g. cmp-clipboard)'
        type: string
        default: ''
      bump:
        description: 'Version bump type: patch (default), minor, or major'
        type: string
        default: 'patch'
      version:
        description: 'Explicit version override. If non-empty, used as-is (no bump). Highest priority.'
        type: string
        default: ''
      version-source:
        description: 'Resolution mode: auto (default), gradle-properties, github-releases, maven-central'
        type: string
        default: 'auto'
      gradle-properties-path:
        description: 'Path to gradle.properties (relative to repo root)'
        type: string
        default: 'gradle.properties'
      gradle-properties-key:
        description: 'Key in gradle.properties holding the version (e.g. kmptoolkit.version). Empty disables this source.'
        type: string
        default: ''
      verify-against-maven:
        description: 'Sanity check: fail if resolved version is not strictly greater than latest on Maven Central'
        type: boolean
        default: true
      tag-pattern:
        description: 'POSIX ERE for valid GitHub Release tags. Default matches vX.Y.Z and X.Y.Z.'
        type: string
        default: '^v?[0-9]+\.[0-9]+\.[0-9]+$'
      bump-after-release:
        description: 'Open a PR bumping gradle-properties-key to the next version after a successful publish. Requires gradle-properties-key.'
        type: boolean
        default: false
      next-bump-type:
        description: 'Bump type for the post-release PR: patch (default), minor, major.'
        type: string
        default: 'patch'
      bump-pr-base-branch:
        description: 'Branch the bump PR targets. Defaults to the branch the publish workflow ran on.'
        type: string
        default: ''
      java-version:
        description: 'JDK version'
        type: string
        default: '21'
      java-distribution:
        description: 'JDK distribution'
        type: string
        default: 'zulu'
      sonatype-host:
        description: 'Sonatype host (CENTRAL_PORTAL / DEFAULT / S01)'
        type: string
        default: 'CENTRAL_PORTAL'
      create-github-release:
        description: 'Create a single GitHub release after all modules are published (flat vX.Y.Z tag for version resolver compatibility)'
        type: boolean
        default: false
      force-prerelease:
        description: |
          Override the pre-release flag on the GitHub Release. Default 'auto'
          inspects the resolved version string and sets prerelease=true on
          SemVer pre-release tags (-alpha.N / -beta.N / -rc.N). Set 'true' to
          force prerelease=true (e.g. for unrecognised pre-release suffixes
          like -snapshot.N). Set 'false' to force prerelease=false (e.g. for
          a re-issued pre-release that has been promoted to GA quality).
        type: string
        default: 'auto'
      publish-gradle-plugin-portal:
        description: 'Also publish to the Gradle Plugin Portal after Maven Central. Requires GRADLE_PUBLISH_KEY and GRADLE_PUBLISH_SECRET secrets.'
        type: boolean
        default: false
    secrets:
      MAVEN_CENTRAL_USERNAME:
        required: true
      MAVEN_CENTRAL_PASSWORD:
        required: true
      SIGNING_KEY_ID:
        required: true
      GPG_KEY_CONTENTS:
        required: true
      SIGNING_PASSWORD:
        required: true
      GH_TOKEN:
        required: false
      GRADLE_PUBLISH_KEY:
        required: false
      GRADLE_PUBLISH_SECRET:
        required: false

permissions:
  contents: write
  pull-requests: write

# Prevent two simultaneous publishes from racing on the same ref. Don't
# cancel in-progress — Maven publishes are not safe to interrupt mid-flight.
concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─── Resolve next version from Maven Central ──────────────────────────────
  resolve-version:
    name: Resolve Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      current: ${{ steps.resolve.outputs.current }}
    steps:
      - name: Checkout (for gradle.properties read)
        uses: actions/checkout@v6
      - name: Resolve next version
        id: resolve
        uses: MobileByteLabs/mbl-actionhub-resolve-version@v1.2.0
        with:
          group-id: ${{ inputs.group-id }}
          artifact-id: ${{ inputs.artifact-id }}
          bump: ${{ inputs.bump }}
          version: ${{ inputs.version }}
          version-source: ${{ inputs.version-source }}
          gradle-properties-path: ${{ inputs.gradle-properties-path }}
          gradle-properties-key: ${{ inputs.gradle-properties-key }}
          verify-against-maven: ${{ inputs.verify-against-maven }}
          tag-pattern: ${{ inputs.tag-pattern }}

  # ─── Discover publishable modules ──────────────────────────────────────────
  discover:
    name: Discover Modules
    needs: resolve-version
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      modules_list: ${{ steps.discover.outputs.modules_list }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Discover Publishable Modules
        id: discover
        run: |
          MODULE_PATH="${{ inputs.module-path }}"
          PATTERN="${{ inputs.module-pattern }}"
          FILTER="${{ inputs.module }}"
          VERSION="${{ needs.resolve-version.outputs.version }}"
          ITEMS=""
          MODULES_LIST=""
          FIRST=true

          if [ -n "$MODULE_PATH" ]; then
            # Direct path mode — bypass glob, use the exact nested module path.
            # Gradle task path converts '/' separators to ':' (e.g. build-logic/flavor-plugin → :build-logic:flavor-plugin).
            GRADLE_PATH=$(echo "$MODULE_PATH" | tr '/' ':')
            ARTIFACT=$(grep 'coordinates(' "${MODULE_PATH}/build.gradle.kts" 2>/dev/null | sed 's/.*coordinates([^,]*, "\([^"]*\)".*/\1/')
            [ -z "$ARTIFACT" ] && ARTIFACT="${MODULE_PATH##*/}"
            ITEMS="{\"module\":\"$MODULE_PATH\",\"gradle-path\":\"$GRADLE_PATH\",\"version\":\"$VERSION\",\"artifact\":\"$ARTIFACT\"}"
            MODULES_LIST="$MODULE_PATH@$VERSION"
          else
            for dir in ${PATTERN}*/; do
              [ ! -d "$dir" ] && continue
              grep -q "mavenPublishing" "${dir}build.gradle.kts" 2>/dev/null || continue

              MODULE="${dir%/}"
              [ -n "$FILTER" ] && [ "$MODULE" != "$FILTER" ] && continue

              ARTIFACT=$(grep 'coordinates(' "${dir}build.gradle.kts" 2>/dev/null | sed 's/.*coordinates([^,]*, "\([^"]*\)".*/\1/')
              [ -z "$ARTIFACT" ] && ARTIFACT="$MODULE"

              [ "$FIRST" = true ] && FIRST=false || { ITEMS="$ITEMS,"; MODULES_LIST="$MODULES_LIST,"; }
              ITEMS="$ITEMS{\"module\":\"$MODULE\",\"gradle-path\":\"$MODULE\",\"version\":\"$VERSION\",\"artifact\":\"$ARTIFACT\"}"
              MODULES_LIST="$MODULES_LIST$MODULE@$VERSION"
            done
          fi

          echo "matrix={\"include\":[$ITEMS]}" >> $GITHUB_OUTPUT
          echo "modules_list=$MODULES_LIST" >> $GITHUB_OUTPUT
          echo "Discovered: $MODULES_LIST"

  # ─── Quality gate (Spotless + Detekt) ──────────────────────────────────────
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ inputs.java-version }}
          distribution: ${{ inputs.java-distribution }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run Spotless Check
        run: ./gradlew spotlessCheck

      - name: Run Detekt
        run: ./gradlew detekt

  # ─── JVM tests ─────────────────────────────────────────────────────────────
  test-jvm:
    name: Test (JVM)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ inputs.java-version }}
          distribution: ${{ inputs.java-distribution }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run JVM Tests
        run: |
          MODULE_PATH="${{ inputs.module-path }}"
          TASKS=""
          if [ -n "$MODULE_PATH" ]; then
            if [ -d "${MODULE_PATH}/src/jvmMain" ]; then
              GRADLE_PATH=$(echo "$MODULE_PATH" | tr '/' ':')
              TASKS=":${GRADLE_PATH}:jvmTest"
            fi
          else
            PATTERN="${{ inputs.module-pattern }}"
            for dir in ${PATTERN}*/; do
              [ "$dir" = "${PATTERN}library/" ] && continue
              [ -d "${dir}/src/jvmMain" ] || continue
              TASKS="$TASKS :${dir%/}:jvmTest"
            done
          fi
          if [ -z "$TASKS" ]; then
            echo "No modules with jvmMain — skipping"
            exit 0
          fi
          echo "Running: ./gradlew $TASKS --parallel"
          ./gradlew $TASKS --parallel

  # ─── Parallel publish (one job per module) ─────────────────────────────────
  publish:
    name: Publish ${{ matrix.module }}@${{ matrix.version }}
    needs: [discover, quality, test-jvm]
    if: needs.discover.outputs.modules_list != ''
    runs-on: macos-14        # macOS required to publish iOS/macOS klibs
    timeout-minutes: 30
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}

    steps:
      # ── module-path mode: run everything inline for nested modules ────────────
      - name: Checkout
        if: ${{ inputs.module-path != '' }}
        uses: actions/checkout@v6

      - name: Set up JDK ${{ inputs.java-version }}
        if: ${{ inputs.module-path != '' }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ inputs.java-version }}
          distribution: ${{ inputs.java-distribution }}

      - name: Setup Gradle
        if: ${{ inputs.module-path != '' }}
        uses: gradle/actions/setup-gradle@v6

      - name: Decode GPG Key
        if: ${{ inputs.module-path != '' }}
        shell: bash
        run: echo "${{ secrets.GPG_KEY_CONTENTS }}" | base64 -d > /tmp/mbl-signing-key.asc

      - name: Publish nested module to Maven Central
        if: ${{ inputs.module-path != '' }}
        env:
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: |
          export ORG_GRADLE_PROJECT_signingInMemoryKey=$(cat /tmp/mbl-signing-key.asc)
          ./gradlew :${{ matrix.gradle-path }}:publishAllPublicationsToMavenCentralRepository \
            --no-daemon \
            --no-configuration-cache
          rm -f /tmp/mbl-signing-key.asc

      # ── module-pattern mode: delegate to the standard publish action ──────────
      - uses: MobileByteLabs/mbl-actionhub-publish-library-kmp@v1.0.1
        if: ${{ inputs.module-path == '' }}
        with:
          module: ${{ matrix.module }}
          version: ${{ matrix.version }}
          maven-central-username: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          maven-central-password: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          gpg-key-id: ${{ secrets.SIGNING_KEY_ID }}
          gpg-key: ${{ secrets.GPG_KEY_CONTENTS }}
          gpg-passphrase: ${{ secrets.SIGNING_PASSWORD }}
          github-token: ${{ secrets.GH_TOKEN }}
          java-version: ${{ inputs.java-version }}
          java-distribution: ${{ inputs.java-distribution }}
          sonatype-host: ${{ inputs.sonatype-host }}
          create-github-release: 'false'

      - name: Module Summary
        if: success()
        run: |
          echo "### ✅ ${{ matrix.module }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Artifact:** io.github.mobilebytelabs:${{ matrix.artifact }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ matrix.version }}" >> $GITHUB_STEP_SUMMARY

      - name: Failure Summary
        if: failure()
        run: |
          echo "### ❌ ${{ matrix.module }}" >> $GITHUB_STEP_SUMMARY
          echo "Failed to publish — check logs." >> $GITHUB_STEP_SUMMARY

  # ─── GitHub Release (single flat tag vX.Y.Z) ────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: [resolve-version, discover, publish]
    runs-on: ubuntu-latest
    if: ${{ inputs.create-github-release && needs.publish.result == 'success' }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build release body
        id: body
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"
          MODULES_LIST="${{ needs.discover.outputs.modules_list }}"
          BODY="## Published Modules\n\n"
          IFS=',' read -ra MODS <<< "$MODULES_LIST"
          for entry in "${MODS[@]}"; do
            MODULE="${entry%%@*}"
            BODY="${BODY}- \`io.github.mobilebytelabs:${MODULE}:${VERSION}\`\n"
          done
          BODY="${BODY}\n**Maven Central:** https://central.sonatype.com/search?q=io.github.mobilebytelabs&sort=published"
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo -e "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Resolve pre-release flag
        id: prerelease
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
          FORCE: ${{ inputs.force-prerelease }}
        run: |
          set -euo pipefail
          # SemVer 2.0.0 pre-release suffixes recognised by mbl-actionhub:
          # -alpha.N / -beta.N / -rc.N (matching mbl-actionhub-bump-version v1.6+).
          case "$FORCE" in
            true)  RESOLVED=true ;;
            false) RESOLVED=false ;;
            auto|"")
              if [[ "$VERSION" =~ -alpha\.[0-9]+ ]] || \
                 [[ "$VERSION" =~ -beta\.[0-9]+ ]] || \
                 [[ "$VERSION" =~ -rc\.[0-9]+ ]]; then
                RESOLVED=true
              else
                RESOLVED=false
              fi
              ;;
            *)
              echo "::error::force-prerelease must be one of: auto, true, false. Got: '$FORCE'"
              exit 1
              ;;
          esac
          echo "value=$RESOLVED" >> "$GITHUB_OUTPUT"
          echo "Resolved prerelease=$RESOLVED for version '$VERSION' (force-prerelease='$FORCE')"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.resolve-version.outputs.version }}
          name: v${{ needs.resolve-version.outputs.version }}
          body: ${{ steps.body.outputs.body }}
          draft: false
          prerelease: ${{ steps.prerelease.outputs.value }}
          token: ${{ secrets.GH_TOKEN || github.token }}

  # ─── Release summary ───────────────────────────────────────────────────────
  summary:
    name: Release Summary
    needs: [resolve-version, discover, publish, create-release]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create Release Summary
        run: |
          MODULE_PATH="${{ inputs.module-path }}"
          PATTERN="${{ inputs.module-pattern }}"
          VERSION="${{ needs.resolve-version.outputs.version }}"
          echo "# Maven Central Release" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Module | Artifact | Version |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|----------|---------|" >> $GITHUB_STEP_SUMMARY

          if [ -n "$MODULE_PATH" ]; then
            ARTIFACT=$(grep 'coordinates(' "${MODULE_PATH}/build.gradle.kts" 2>/dev/null | sed 's/.*coordinates([^,]*, "\([^"]*\)".*/\1/')
            [ -z "$ARTIFACT" ] && ARTIFACT="${MODULE_PATH##*/}"
            echo "| $MODULE_PATH | io.github.mobilebytelabs:$ARTIFACT | $VERSION |" >> $GITHUB_STEP_SUMMARY
          else
            for dir in ${PATTERN}*/; do
              [ ! -d "$dir" ] && continue
              grep -q "mavenPublishing" "${dir}build.gradle.kts" 2>/dev/null || continue
              MODULE="${dir%/}"
              FILTER="${{ inputs.module }}"
              [ -n "$FILTER" ] && [ "$MODULE" != "$FILTER" ] && continue
              ARTIFACT=$(grep 'coordinates(' "${dir}build.gradle.kts" 2>/dev/null | sed 's/.*coordinates([^,]*, "\([^"]*\)".*/\1/')
              [ -z "$ARTIFACT" ] && ARTIFACT="$MODULE"
              echo "| $MODULE | io.github.mobilebytelabs:$ARTIFACT | $VERSION |" >> $GITHUB_STEP_SUMMARY
            done
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "*[Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*" >> $GITHUB_STEP_SUMMARY

  # ─── Auto-open bump PR for the next release cycle ──────────────────────────
  # Runs only after every module publish + GH release succeeded, on the FIRST
  # attempt of a workflow run (re-runs do NOT re-bump), and only if the caller
  # opted in via bump-after-release + gradle-properties-key.
  bump-next-version:
    name: Open Bump PR (next cycle)
    needs: [resolve-version, publish, create-release]
    if: |
      success() &&
      inputs.bump-after-release == true &&
      inputs.gradle-properties-key != '' &&
      github.run_attempt == 1
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN || github.token }}

      - name: Open bump PR
        uses: MobileByteLabs/mbl-actionhub-bump-version@v1.6.0
        with:
          published-version: ${{ needs.resolve-version.outputs.version }}
          properties-path: ${{ inputs.gradle-properties-path }}
          properties-key: ${{ inputs.gradle-properties-key }}
          bump-type: ${{ inputs.next-bump-type }}
          base-branch: ${{ inputs.bump-pr-base-branch }}
          github-token: ${{ secrets.GH_TOKEN || github.token }}

  # ─── Gradle Plugin Portal publish (opt-in) ─────────────────────────────────
  publish-plugin-portal:
    name: Publish to Gradle Plugin Portal
    needs: publish
    if: ${{ inputs.publish-gradle-plugin-portal == true && needs.publish.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ inputs.java-version }}
          distribution: ${{ inputs.java-distribution }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Decode GPG Key
        shell: bash
        run: echo "${{ secrets.GPG_KEY_CONTENTS }}" | base64 -d > /tmp/mbl-signing-key.asc

      - name: Publish to Gradle Plugin Portal
        env:
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
        run: |
          export ORG_GRADLE_PROJECT_signingInMemoryKey=$(cat /tmp/mbl-signing-key.asc)
          MODULE_PATH="${{ inputs.module-path }}"
          if [ -n "$MODULE_PATH" ]; then
            GRADLE_PATH=$(echo "$MODULE_PATH" | tr '/' ':')
            TASK=":${GRADLE_PATH}:publishPlugins"
          else
            PATTERN="${{ inputs.module-pattern }}"
            FILTER="${{ inputs.module }}"
            TASK=""
            for dir in ${PATTERN}*/; do
              [ ! -d "$dir" ] && continue
              grep -q "gradlePlugin" "${dir}build.gradle.kts" 2>/dev/null || continue
              MODULE="${dir%/}"
              [ -n "$FILTER" ] && [ "$MODULE" != "$FILTER" ] && continue
              TASK="$TASK :${MODULE}:publishPlugins"
            done
          fi
          if [ -z "$TASK" ]; then
            echo "No modules with Gradle plugin publishing — skipping"
            exit 0
          fi
          echo "Running: ./gradlew $TASK"
          ./gradlew $TASK \
            --no-daemon \
            --no-configuration-cache \
            -Pgradle.publish.key=${{ secrets.GRADLE_PUBLISH_KEY }} \
            -Pgradle.publish.secret=${{ secrets.GRADLE_PUBLISH_SECRET }}
          rm -f /tmp/mbl-signing-key.asc
